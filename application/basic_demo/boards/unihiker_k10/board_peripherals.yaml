version: 1.0.0
peripherals:
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 1
      pins:
        sda: 47
        scl: 48

  - name: i2s_audio_out
    type: i2s
    role: master
    format: std-out
    config: &k10_i2s_tx
      port: 0
      sample_rate_hz: 24000
      clk_src: I2S_CLK_SRC_DEFAULT
      mclk_multiple: 256
      data_bit_width: 16
      slot_bit_width: I2S_SLOT_BIT_WIDTH_AUTO
      slot_mode: I2S_SLOT_MODE_MONO
      slot_mask: I2S_STD_SLOT_BOTH
      ws_width: 16
      ws_pol: false
      bit_shift: true
      left_align: true
      big_endian: false
      bit_order_lsb: false
      pins:
        mclk: 3
        bclk: 0
        ws: 38
        dout: 45
        din: 39

  - name: i2s_audio_in
    type: i2s
    role: master
    format: tdm-in
    config:
      <<: *k10_i2s_tx
      bclk_div: 8
      slot_mode: I2S_SLOT_MODE_STEREO
      slot_mask: I2S_TDM_SLOT0 | I2S_TDM_SLOT1 | I2S_TDM_SLOT2 | I2S_TDM_SLOT3
      left_align: false
      total_slot: 4

  - name: spi_display
    type: spi
    role: master
    config:
      spi_bus_config:
        spi_port: SPI3_HOST
        mosi_io_num: 21
        sclk_io_num: 12
        max_transfer_sz: 6400

  - name: gpio_audio_dummy_pa
    type: gpio
    role: io
    config:
      pin: 37
      mode: GPIO_MODE_OUTPUT
      default_level: 0
